services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stepsmart
      POSTGRES_PASSWORD: stepsmart
      POSTGRES_DB: stepsmart
    ports:
      - "5433:5432"
    volumes:
      - stepsmart_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - stepsmart_redis_data:/data

volumes:
  stepsmart_pg_data:
  stepsmart_redis_data:
